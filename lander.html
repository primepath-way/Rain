<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="css/style.css">

   <style>
  body {
    margin: 0;
    height: 100vh;
    background: url("https://raw.githubusercontent.com/neo-aussie/img/refs/heads/main/rainbet%20lap.png") no-repeat center center;
    background-size: cover;
  }
 
  /* Mobile (max 600px) */
  @media (max-width: 600px) {
    body {
      background-image: url("https://raw.githubusercontent.com/neo-aussie/img/refs/heads/main/rainbet%20mob.png");
    }
  }
 
  /* Tablet (601px – 1024px) */
  @media (min-width: 601px) and (max-width: 1024px) {
    body {
      background-image: url("https://raw.githubusercontent.com/neo-aussie/img/refs/heads/main/rainbet%20mob.png");
    }
  }
 
  /* Desktop (above 1024px) */
  @media (min-width: 1025px) {
    body {
      background-image: url("https://raw.githubusercontent.com/neo-aussie/img/refs/heads/main/rainbet%20lap.png");
    }
  }
</style>
